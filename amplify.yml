# AWS Amplify Hosting — monorepo build spec (required when the app is connected as a monorepo).
# AMPLIFY_MONOREPO_APP_ROOT in the Amplify console must match appRoot (e.g. CamDigitalProfile).
version: 1
applications:
  - appRoot: CamDigitalProfile
    frontend:
      phases:
        build:
          commands:
            - echo "Publish static site; optional agent URL injection."
            - |
                set -e
                APPROOT="${AMPLIFY_MONOREPO_APP_ROOT:-CamDigitalProfile}"
                cd "$APPROOT"
                python3 scripts/inject-agent-endpoint.py
      artifacts:
        baseDirectory: .
        files:
          - "**/*"
      cache:
        paths: []
